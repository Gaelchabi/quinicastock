services:
  postgres:
    image: postgres:15-alpine
    container_name: quinicastock-db
    environment:
      POSTGRES_DB: quinicastock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    image: quinicastock-auth:latest
    container_name: quinicastock-auth
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: quinicastock-secret-key-min-256-bits-long-enough
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  tenant-service:
    image: quinicastock-tenant:latest
    container_name: quinicastock-tenant
    build:
      context: .
      dockerfile: tenant-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    image: quinicastock-inventory:latest
    container_name: quinicastock-inventory
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    image: nginx:alpine
    container_name: quinicastock-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - tenant-service
      - inventory-service
