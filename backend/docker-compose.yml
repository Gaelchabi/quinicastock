version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quinicastock-db
    environment:
      POSTGRES_DB: quinicastock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: quinicastock-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: quinicastock-secret-key-min-256-bits-long-enough
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  tenant-service:
    build:
      context: .
      dockerfile: tenant-service/Dockerfile
    container_name: quinicastock-tenant
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: quinicastock-inventory
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quinicastock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: quinicastock-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - tenant-service
      - inventory-service

volumes:
  postgres_data: