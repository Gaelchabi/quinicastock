spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[1].id=tenant-service
spring.cloud.gateway.routes[1].uri=http://tenant-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/tenants/**
spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=http://inventory-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/inventory/**

spring.profiles.active=docker
spring.datasource.url=jdbc:postgresql://postgres:5432/quinicastock
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
